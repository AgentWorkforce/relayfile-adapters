name: Publish Package

on:
  workflow_dispatch:
    inputs:
      package:
        description: |
          Package(s) to publish. Accepts:
            • all
            • missing (only versions not yet on npm)
            • a group alias: storage, messaging, devtools, crm, pm, support, analytics, email, commerce, db
            • one or more package dir names, comma- or space-separated (e.g. "slack,linear" or "github gitlab")
        required: true
        type: string
        default: "all"
      version:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
          - prerelease
        default: "patch"
      tag:
        description: "NPM dist-tag"
        required: false
        type: choice
        options:
          - latest
          - next
          - beta
        default: "latest"
      dry_run:
        description: "Dry run (do not actually publish)"
        required: false
        type: boolean
        default: false

concurrency:
  group: publish-package
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - run: npm ci

      - name: Upgrade npm to latest
        run: npm install -g npm@latest

      - name: Build all packages
        run: npx turbo build

      - name: Resolve packages to publish
        id: resolve
        env:
          INPUT_PACKAGE: ${{ github.event.inputs.package }}
        run: |
          node scripts/resolve-publish-targets.mjs "$INPUT_PACKAGE" >> "$GITHUB_OUTPUT"

      - name: Version packages
        run: |
          for pkg in ${{ steps.resolve.outputs.packages }}; do
            cd packages/$pkg
            npm version ${{ github.event.inputs.version }} --no-git-tag-version
            cd ../..
          done

      - name: Sync internal dependency specifiers
        run: node scripts/sync-internal-dependencies.mjs

      - name: Publish packages
        run: |
          for pkg in ${{ steps.resolve.outputs.packages }}; do
            cd packages/$pkg

            if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
              echo "DRY RUN: $(node -p "require('./package.json').name")@$(node -p "require('./package.json').version")"
              npm publish --dry-run --access public --tag ${{ github.event.inputs.tag }}
            else
              npm publish --access public --provenance --tag ${{ github.event.inputs.tag }} --ignore-scripts
              echo "Published $(node -p "require('./package.json').name")@$(node -p "require('./package.json').version")"
            fi

            cd ../..
          done

      - name: Commit version bumps
        if: github.event.inputs.dry_run != 'true'
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add packages/*/package.json
          if ! git diff --staged --quiet; then
            git commit -m "chore(release): bump ${{ github.event.inputs.package }} (${{ github.event.inputs.version }})"
            git push
          fi
