name: Publish Package

on:
  workflow_dispatch:
    inputs:
      package:
        description: |
          Package(s) to publish. Accepts:
            • all
            • missing (only versions not yet on npm)
            • a group alias: storage, messaging, calendar, devtools, crm, pm, support, analytics, email, commerce, db
            • one or more package dir names, comma- or space-separated (e.g. "google-calendar", "slack,linear", or "github gitlab")
        required: true
        type: string
        default: "all"
      version:
        description: |
          Version bump or exact version. Accepts:
            • patch / minor / major / prerelease (npm version semantics)
            • none (skip bump, publish current package.json version as-is)
            • an exact semver like 1.2.3 or 0.2.0-beta.1
        required: true
        type: string
        default: "patch"
      tag:
        description: "NPM dist-tag"
        required: false
        type: choice
        options:
          - latest
          - next
          - beta
        default: "latest"
      dry_run:
        description: "Dry run (do not actually publish)"
        required: false
        type: boolean
        default: false

concurrency:
  group: publish-package
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: npm
          registry-url: "https://registry.npmjs.org"

      - run: npm ci

      - name: Upgrade npm to latest
        run: npm install -g npm@latest

      - name: Build all packages
        run: npx turbo build

      - name: Resolve packages to publish
        id: resolve
        env:
          INPUT_PACKAGE: ${{ github.event.inputs.package }}
        run: |
          node scripts/resolve-publish-targets.mjs "$INPUT_PACKAGE" >> "$GITHUB_OUTPUT"

      - name: Version packages
        env:
          INPUT_VERSION: ${{ github.event.inputs.version }}
          RESOLVED_PACKAGES: ${{ steps.resolve.outputs.packages }}
        run: |
          set -euo pipefail
          while IFS= read -r pkg; do
            [ -n "$pkg" ] || continue
            case "$pkg" in
              *[!a-zA-Z0-9_-]*)
                echo "Invalid package slug: $pkg" >&2
                exit 1
                ;;
            esac
            cd "packages/$pkg"
            if [ "$INPUT_VERSION" != "none" ]; then
              npm version "$INPUT_VERSION" --no-git-tag-version --allow-same-version
            fi
            cd ../..
          done < <(printf '%s\n' "$RESOLVED_PACKAGES" | tr ' ,' '\n' | sed '/^$/d')

      - name: Sync internal dependency specifiers
        run: node scripts/sync-internal-dependencies.mjs

      - name: Publish packages
        env:
          INPUT_TAG: ${{ github.event.inputs.tag }}
          INPUT_DRY_RUN: ${{ github.event.inputs.dry_run }}
          RESOLVED_PACKAGES: ${{ steps.resolve.outputs.packages }}
        run: |
          set -euo pipefail
          while IFS= read -r pkg; do
            [ -n "$pkg" ] || continue
            case "$pkg" in
              *[!a-zA-Z0-9_-]*)
                echo "Invalid package slug: $pkg" >&2
                exit 1
                ;;
            esac
            cd "packages/$pkg"

            name=$(node -p "require('./package.json').name")
            version=$(node -p "require('./package.json').version")

            if [ "$INPUT_DRY_RUN" = "true" ]; then
              echo "DRY RUN: $name@$version"
              npm publish --dry-run --access public --tag "$INPUT_TAG" --ignore-scripts
            else
              npm publish --access public --provenance --tag "$INPUT_TAG" --ignore-scripts
              echo "Published $name@$version"
            fi

            cd ../..
          done < <(printf '%s\n' "$RESOLVED_PACKAGES" | tr ' ,' '\n' | sed '/^$/d')

      - name: Commit version bumps
        if: github.event.inputs.dry_run != 'true' && github.event.inputs.version != 'none'
        env:
          INPUT_PACKAGE: ${{ github.event.inputs.package }}
          INPUT_VERSION: ${{ github.event.inputs.version }}
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add packages/*/package.json
          if ! git diff --staged --quiet; then
            git commit -m "chore(release): bump ${INPUT_PACKAGE} (${INPUT_VERSION})"
            git push
          fi
