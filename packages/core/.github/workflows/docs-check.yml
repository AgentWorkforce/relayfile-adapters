name: Docs Check

on:
  workflow_dispatch:
    inputs:
      spec:
        description: OpenAPI spec generated by docs-to-spec
        required: true
        type: string

jobs:
  docs-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Cheap docs change check
        run: npx adapter-core docs-check --spec "${{ inputs.spec }}"
      - name: Update generated docs spec
        run: npx adapter-core docs-update --spec "${{ inputs.spec }}"
