name: Drift Check

on:
  schedule:
    - cron: "0 9 * * 1"
  workflow_dispatch:

jobs:
  drift:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        spec:
          - mappings/github.mapping.yaml
          - mappings/slack.mapping.yaml
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Run drift check
        id: drift
        run: |
          mkdir -p .adapter-core
          SNAPSHOT=".adapter-core/$(basename "${{ matrix.spec }}" .mapping.yaml).json"
          if [ ! -f "$SNAPSHOT" ]; then
            cat <<'EOF' > "$SNAPSHOT"
          {"title":"baseline","version":"0.0.0","sourceKind":"samples","sourceLocation":"bootstrap","endpoints":[],"schemas":{},"webhookSchemas":{}}
          EOF
          fi
          node dist/src/cli.js drift --spec "${{ matrix.spec }}" --baseline "$SNAPSHOT" > drift-report.json || true
          cat drift-report.json
          if jq -e '.breaking | length > 0' drift-report.json > /dev/null; then
            echo "has_breaking=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_breaking=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Open issue on breaking drift
        if: steps.drift.outputs.has_breaking == 'true'
        uses: peter-evans/create-issue-from-file@v5
        with:
          title: "Adapter drift detected for ${{ matrix.spec }}"
          content-filepath: drift-report.json
