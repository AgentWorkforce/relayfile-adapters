adapter:
  name: neon
  version: "1.0.0"
  baseUrls:
    api: https://console.neon.tech/api/v2
scopeKeys:
  - organizationId
  - projectId
webhooks:
  operation.failed:
    path: /neon/operations
  operation.cancelled:
    path: /neon/operations
  operation.succeeded:
    path: /neon/operations
  endpoint.state_changed:
    path: /neon/endpoints
  advisor.issue_raised:
    path: /neon/advisors
resources:
  organizations:
    path: /neon/organizations
  projects:
    path: /neon/projects
  branches:
    path: /neon/branches
  endpoints:
    path: /neon/endpoints
  operations:
    path: /neon/operations
  project-consumption:
    path: /neon/consumption/projects
  branch-consumption:
    path: /neon/consumption/branches
  spending-limits:
    path: /neon/spending-limits
  advisor-issues:
    path: /neon/advisors
