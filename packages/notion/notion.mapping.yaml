provider: notion
root: /notion
paths:
  - pattern: /notion/databases/{database_id}/metadata.json
    object_type: database
    source:
      method: GET
      endpoint: /v1/databases/{database_id}
  - pattern: /notion/databases/{database_id}/pages/{page_id}.json
    object_type: page
    source:
      method: GET
      endpoint: /v1/pages/{page_id}
    writeback:
      method: PATCH
      endpoint: /v1/pages/{page_id}
  - pattern: /notion/databases/{database_id}/pages/{page_id}/content.md
    object_type: page_content
    source:
      method: GET
      endpoint: /v1/pages/{page_id}/markdown
      notion_version: 2026-03-11
    writeback:
      method: PATCH
      endpoint: /v1/pages/{page_id}/markdown
      notion_version: 2026-03-11
  - pattern: /notion/databases/{database_id}/pages/{page_id}/blocks/{block_id}.json
    object_type: block
    source:
      method: GET
      endpoint: /v1/blocks/{block_id}
  - pattern: /notion/databases/{database_id}/pages/{page_id}/comments.json
    object_type: comment
    source:
      method: GET
      endpoint: /v1/comments?block_id={page_id}
    writeback:
      method: POST
      endpoint: /v1/comments
  - pattern: /notion/pages/{page_id}.json
    object_type: page
    source:
      method: GET
      endpoint: /v1/pages/{page_id}
    writeback:
      method: PATCH
      endpoint: /v1/pages/{page_id}
  - pattern: /notion/pages/{page_id}/content.md
    object_type: page_content
    source:
      method: GET
      endpoint: /v1/pages/{page_id}/markdown
      notion_version: 2026-03-11
    writeback:
      method: PATCH
      endpoint: /v1/pages/{page_id}/markdown
      notion_version: 2026-03-11
  - pattern: /notion/pages/{page_id}/comments.json
    object_type: comment
    source:
      method: GET
      endpoint: /v1/comments?block_id={page_id}
    writeback:
      method: POST
      endpoint: /v1/comments
collections:
  - pattern: /notion/databases/{database_id}/pages
    writeback:
      method: POST
      endpoint: /v1/pages
      body:
        parent:
          database_id: '{database_id}'
# Notion webhook event types this provider emits at runtime. These are the
# verbatim event names the notion-relay syncs subscribe to (see cloud
# nango-integrations/notion-relay/syncs/fetch-pages.ts PAGE_WEBHOOK_EVENTS and
# fetch-databases.ts DATABASE_WEBHOOK_EVENTS) and are what persona trigger
# autocomplete and deploy-time lint match against via KNOWN_TRIGGER_CATALOG.
webhooks:
  page.created:
    path: /notion/pages/{page_id}.json
  page.content_updated:
    path: /notion/pages/{page_id}.json
  page.properties_updated:
    path: /notion/pages/{page_id}.json
  page.moved:
    path: /notion/pages/{page_id}.json
  page.deleted:
    path: /notion/pages/{page_id}.json
  page.undeleted:
    path: /notion/pages/{page_id}.json
  page.locked:
    path: /notion/pages/{page_id}.json
  page.unlocked:
    path: /notion/pages/{page_id}.json
  database.created:
    path: /notion/databases/{database_id}/metadata.json
  database.schema_updated:
    path: /notion/databases/{database_id}/metadata.json
  database.moved:
    path: /notion/databases/{database_id}/metadata.json
  database.deleted:
    path: /notion/databases/{database_id}/metadata.json
  database.undeleted:
    path: /notion/databases/{database_id}/metadata.json
