    notes: "GitLab uses OAuth application scopes through Nango's gitlab provider, which is OAUTH2 and declares no default scopes. The adapter reads merge requests, MR diffs/discussions/approvals, issues, pipelines/jobs, and repository commits, and writes merge requests, issues, MR discussions, and issue notes through GitLab REST API endpoints. GitLab documents the `api` scope as complete read/write API access; `read_api` is read-only, `read_repository` covers Git-over-HTTP or the Repository Files API, and `write_repository` is Git-over-HTTP only and does not support API authentication. No separate webhook OAuth scope is documented; project hook management, if Relayfile provisions hooks through the API, is also covered by `api`, while webhook delivery still depends on project/user permissions."

