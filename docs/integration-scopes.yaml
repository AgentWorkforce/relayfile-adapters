  - slug: azure-blob
    display_name: Azure Blob Storage
    category: storage
    status: implemented
    package: "@relayfile/azure-blob"
    nango_slug: azure-blob-storage
    auth_model: cloud_iam_or_oauth
    scope_status: verified
    required_scopes:
      - offline_access
      - https://storage.azure.com/.default
      - "Azure Blob Storage delegated permission: user_impersonation"
      - Storage Blob Data Contributor
      - EventGrid EventSubscription Contributor
    candidate_scopes: []
    sources:
      - https://nango.dev/docs/integrations/all/azure-blob-storage
      - https://nango.dev/docs/integrations/all/azure-blob-storage/connect
      - https://raw.githubusercontent.com/NangoHQ/nango/master/packages/providers/providers.yaml
      - https://learn.microsoft.com/en-us/azure/storage/blobs/authorize-access-azure-active-directory
      - https://learn.microsoft.com/en-us/rest/api/storageservices/authorize-with-azure-active-directory
      - https://learn.microsoft.com/en-us/azure/role-based-access-control/built-in-roles
      - https://learn.microsoft.com/en-us/azure/event-grid/security-authorization
      - https://learn.microsoft.com/en-us/azure/event-grid/event-schema-blob-storage
    notes: "Azure Blob Storage uses Microsoft OAuth through Nango plus Azure RBAC for authorization. Nango's provider registry and docs default to offline_access and https://storage.azure.com/.default, and the Azure app setup grants the Azure Blob Storage delegated user_impersonation permission. Blob read/write/delete requires a data-plane role such as Storage Blob Data Contributor at the narrowest practical storage account or container scope. Event Grid delivery itself is not an OAuth scope, but creating, updating, or deleting storage-account event subscriptions requires EventGrid EventSubscription Contributor, or an equivalent custom role with Microsoft.EventGrid/eventSubscriptions/* at the storage account event-source scope."

