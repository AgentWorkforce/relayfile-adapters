version: 1
title: Relayfile integration scope catalog
updated: "2026-05-10"
purpose: >
  Machine-readable scope inventory for Relayfile adapter evals and app
  registration. Entries start as pending unless scopes were already provided or
  verified. The research workflow in
  workflows/repeatable/research-integration-scopes.ts fills pending entries from
  Nango and provider documentation.

status_values:
  verified: Scopes were confirmed from user-provided app config or official docs.
  needs_review: Candidate scopes are present but need verification before use.
  pending: Scope research has not been completed.
  not_applicable: Integration does not use OAuth scopes for Relayfile's app registration.

default_research_sources:
  - https://nango.dev/docs/integrations/overview
  - https://nango.dev/api-integrations
  - https://github.com/NangoHQ/nango/blob/master/packages/providers/providers.yaml

integrations:
