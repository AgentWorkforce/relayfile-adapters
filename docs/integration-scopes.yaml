    notes: "Google Cloud Storage can use Google OAuth through Nango or service account credentials. The adapter's object read/write/delete surface maps to Cloud Storage JSON object methods, so OAuth connections need https://www.googleapis.com/auth/devstorage.read_write and the authorized principal or service account still needs object IAM permissions for get, list, create, update, and delete on the target buckets. Pub/Sub notification configuration is not a separate OAuth scope in the Storage JSON API; notification insert/delete require storage.buckets.update, notification get/list require storage.buckets.get, the configuring identity needs to view the destination Pub/Sub topic, and the bucket project's Cloud Storage service agent must have roles/pubsub.publisher on that topic. If Relayfile provisions Pub/Sub topics or subscriptions itself, add the relevant Pub/Sub create/update/consume grants separately; they are not required for the current bucket notificationConfig eval surface."

  - slug: github
    display_name: GitHub
    category: dev-tools
    status: implemented
    package: "@relayfile/adapter-github"
    nango_slug: github
    auth_model: github_app_or_oauth
    scope_status: verified
    required_scopes:
      - "GitHub App permission: Metadata: read"
      - "GitHub App permission: Contents: read"
      - "GitHub App permission: Issues: read"
      - "GitHub App permission: Pull requests: write"
      - "GitHub App permission: Checks: read"
      - "GitHub App permission: Webhooks: read"
      - "GitHub App permission: Webhooks: write"
      - "GitHub App event: pull_request"
      - "GitHub App event: pull_request_review"
      - "GitHub App event: pull_request_review_comment"
      - "GitHub App event: issues"
      - "GitHub App event: check_run"
      - "OAuth App scope: repo"
      - "OAuth App scope: admin:repo_hook"
    candidate_scopes: []
    sources:
      - https://nango.dev/docs/api-integrations/github-app-oauth
      - https://nango.dev/docs/integrations/all/github-app
      - https://raw.githubusercontent.com/NangoHQ/nango/master/packages/providers/providers.yaml
      - https://github.com/NangoHQ/integration-templates/tree/main/integrations/github
      - https://raw.githubusercontent.com/NangoHQ/integration-templates/main/integrations/github/.nango/nango.json
      - https://docs.github.com/en/apps/creating-github-apps/registering-a-github-app/choosing-permissions-for-a-github-app
      - https://docs.github.com/en/apps/oauth-apps/building-oauth-apps/scopes-for-oauth-apps
      - https://docs.github.com/en/rest/authentication/permissions-required-for-fine-grained-personal-access-tokens?apiVersion=2022-11-28
      - https://docs.github.com/en/rest/checks/runs?apiVersion=2022-11-28
      - https://docs.github.com/en/rest/pulls/reviews?apiVersion=2022-11-28
      - https://docs.github.com/en/rest/repos/webhooks?apiVersion=2026-03-10
      - https://docs.github.com/en/webhooks/webhook-events-and-payloads
    notes: "Nango exposes GitHub App OAuth and GitHub App providers but does not publish default action-level scopes for this adapter surface, so the minimum is derived from GitHub's REST endpoint and webhook permission docs. For GitHub App installations, metadata read is the baseline repository metadata permission; contents read covers repository content and commit/file reads; issues read covers issue metadata and issue comments; pull requests write is needed because the adapter writes, updates, and deletes pull request reviews and also covers PR/review read; checks read covers check-run ingestion. Webhook subscriptions for pull_request, pull_request_review, pull_request_review_comment, issues, and check_run require the corresponding read-level repository permissions when using a GitHub App's configured webhook. Programmatic repository webhook actions under Relayfile's Nango provider config key `github-relay` use GitHub REST API version 2026-03-10: list/get/ping/test require repository Webhooks read permission, while create/update/delete require repository Webhooks write permission. For OAuth App connections against private repositories, GitHub's classic repo scope is the practical broad minimum and admin:repo_hook is the narrower repository-hook administration scope; public-only deployments may be able to use public_repo for non-hook surfaces, but that does not cover the full private-repository eval surface."

  - slug: gitlab
